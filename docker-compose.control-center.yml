services:
  control-center-backend:
    container_name: control-center-backend
    build:
      context: ./web-control-center/backend
    environment:
      COOLIFY_BASE_URL: ${COOLIFY_BASE_URL:?COOLIFY_BASE_URL e obrigatorio}
      COOLIFY_TOKEN: ${COOLIFY_TOKEN:?COOLIFY_TOKEN e obrigatorio}
      WEB_AUTH_USER: ${WEB_AUTH_USER:?WEB_AUTH_USER e obrigatorio}
      WEB_AUTH_PASSWORD_HASH: ${WEB_AUTH_PASSWORD_HASH:?gere com npm run hash-password}
      WEB_ACCESS_TOKEN: ${WEB_ACCESS_TOKEN:-}
      SESSION_TTL_MS: ${SESSION_TTL_MS:-28800000}
      AUDIT_LOG_PATH: ${AUDIT_LOG_PATH:-/var/lib/control-center/audit.log.jsonl}
      # Historico opcional: sem esta variavel o painel opera normalmente, sem metricas acumuladas.
      HISTORY_DATABASE_URL: ${HISTORY_DATABASE_URL:-}
      # Monitoramento de VPS opcional: sem token a secao de infraestrutura nao aparece.
      HOSTINGER_API_TOKEN: ${HOSTINGER_API_TOKEN:-}
      ALERT_CPU_PCT: ${ALERT_CPU_PCT:-85}
      ALERT_RAM_PCT: ${ALERT_RAM_PCT:-90}
      ALERT_DISK_PCT: ${ALERT_DISK_PCT:-85}
      PORT: 8787
    volumes:
      - control-center-data:/var/lib/control-center
    mem_limit: 512m
    restart: unless-stopped
    networks:
      - default

  control-center-frontend:
    container_name: control-center-frontend
    build:
      context: ./web-control-center/frontend
    depends_on:
      control-center-backend:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.services.control-center-web.loadbalancer.server.port=8080
      - traefik.http.routers.control-center-web-http.rule=Host(`control.nixcon.com.br`)
      - traefik.http.routers.control-center-web-http.entrypoints=http
      - traefik.http.routers.control-center-web-http.middlewares=control-center-https-redirect
      - traefik.http.middlewares.control-center-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.control-center-https-redirect.redirectscheme.permanent=true
      - traefik.http.routers.control-center-web-https.rule=Host(`control.nixcon.com.br`)
      - traefik.http.routers.control-center-web-https.entrypoints=https
      - traefik.http.routers.control-center-web-https.tls=true
      - traefik.http.routers.control-center-web-https.tls.certresolver=letsencrypt
      - traefik.http.routers.control-center-web-https.service=control-center-web
    # Sem `ports:` de proposito. O painel da poder administrativo total sobre o
    # Coolify e so deve ser alcancavel via Traefik com TLS. Para desenvolvimento
    # local use o override: docker-compose.control-center.dev.yml
    mem_limit: 128m
    networks:
      - default
      - coolify
    restart: unless-stopped

volumes:
  control-center-data:

networks:
  coolify:
    external: true
