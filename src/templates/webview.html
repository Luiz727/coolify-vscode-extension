<!DOCTYPE html>
<html lang="${uiLanguage}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src ${cspSource} https: data:; style-src ${cspSource} 'unsafe-inline'; script-src 'nonce-${nonce}';"
    />
    <style>
      :root {
        --panel-radius: 10px;
        --card-radius: 10px;
        --control-radius: 6px;
        --panel-padding: 12px;
      }

      body {
        font-family: var(--vscode-font-family);
        color: var(--vscode-foreground);
        background: var(--vscode-sideBar-background);
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .section {
        display: flex;
        flex-direction: column;
        gap: 10px;
        background: var(--vscode-editor-background);
        border: 1px solid var(--vscode-widget-border);
        border-radius: var(--panel-radius);
        padding: var(--panel-padding);
      }

      .context-section {
        gap: 8px;
        background: var(--vscode-sideBar-background);
      }

      .section-header {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
      }

      .section-header h3 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        color: var(--vscode-foreground);
      }

      .section-title-group {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .section-count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 22px;
        height: 18px;
        padding: 0 6px;
        border-radius: 999px;
        background: var(--vscode-badge-background);
        color: var(--vscode-badge-foreground);
        font-size: 11px;
        line-height: 1;
      }

      .header-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .section-toggle-button {
        width: 26px;
        height: 26px;
        border-radius: var(--control-radius);
        border: 1px solid var(--vscode-widget-border);
        background: transparent;
        color: var(--vscode-descriptionForeground);
        cursor: pointer;
        font-size: 11px;
        line-height: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background 120ms ease, border-color 120ms ease, color 120ms ease;
      }

      .section-toggle-button:hover {
        background: var(--vscode-list-hoverBackground);
        color: var(--vscode-foreground);
      }

      .section-body {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .section-body.section-collapsed {
        display: none;
      }

      .filter-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 0;
      }

      .favorite-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--vscode-descriptionForeground);
      }

      .favorite-toggle input {
        margin: 0;
      }

      .filter-label {
        font-size: 12px;
        color: var(--vscode-descriptionForeground);
      }

      .status-filter {
        padding: 5px 9px;
        border-radius: var(--control-radius);
        border: 1px solid var(--vscode-widget-border);
        background: var(
          --vscode-dropdown-background,
          var(--vscode-input-background)
        );
        color: var(--vscode-dropdown-foreground, var(--vscode-input-foreground));
        font-size: 12px;
        min-width: 140px;
      }

      .text-filter {
        padding: 5px 9px;
        border-radius: var(--control-radius);
        border: 1px solid var(--vscode-widget-border);
        background: var(
          --vscode-input-background,
          var(--vscode-dropdown-background)
        );
        color: var(--vscode-input-foreground, var(--vscode-dropdown-foreground));
        font-size: 12px;
        min-width: 150px;
      }

      .context-select {
        min-width: 180px;
      }

      .refresh-button {
        padding: 5px 10px;
        background: transparent;
        color: var(--vscode-button-foreground);
        border: 1px solid var(--vscode-button-background);
        border-radius: var(--control-radius);
        cursor: pointer;
        font-size: 12px;
        transition: background 120ms ease, border-color 120ms ease;
      }

      .refresh-button:hover {
        background: var(--vscode-button-background);
      }

      .cards-container {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .card {
        background: var(--vscode-sideBar-background);
        border: 1px solid var(--vscode-widget-border);
        border-radius: var(--card-radius);
        padding: 12px;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
      }

      .card:hover {
        border-color: var(--vscode-focusBorder);
        background: var(--vscode-editorWidget-background, var(--vscode-sideBar-background));
        transform: translateY(-1px);
      }

      .application-card {
        position: relative;
      }

      .card-main {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding-right: 28px;
      }

      .favorite-button {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 24px;
        height: 24px;
        border-radius: var(--control-radius);
        border: 1px solid var(--vscode-widget-border);
        background: transparent;
        color: var(--vscode-descriptionForeground);
        cursor: pointer;
        font-size: 14px;
        line-height: 1;
      }

      .favorite-button:hover {
        background: var(--vscode-list-hoverBackground);
      }

      .favorite-button.favorite-active {
        color: var(--vscode-charts-yellow);
        border-color: var(--vscode-charts-yellow);
      }

      .card-title {
        font-weight: 600;
        font-size: 14px;
        color: var(--vscode-editor-foreground);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-subtitle {
        font-size: 12px;
        color: var(--vscode-descriptionForeground);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-content {
        display: grid;
        grid-template-columns: minmax(80px, auto) 1fr;
        gap: 6px 12px;
        font-size: 12px;
      }

      .card-footer {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: space-between;
        align-items: center;
        padding-top: 12px;
        border-top: 1px solid var(--vscode-widget-border);
      }

      .label {
        color: var(--vscode-descriptionForeground);
        white-space: nowrap;
      }

      .value {
        color: var(--vscode-foreground);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }

      .status {
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 12px;
        background: var(--vscode-badge-background);
        color: var(--vscode-badge-foreground);
        white-space: nowrap;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .status-group {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .health-status {
        border: 1px solid transparent;
        background: var(--vscode-editor-background);
      }

      .status-health-healthy {
        color: var(--vscode-charts-green);
        border-color: var(--vscode-charts-green);
      }

      .status-health-unhealthy {
        color: var(--vscode-charts-red);
        border-color: var(--vscode-charts-red);
      }

      .status-health-starting {
        color: var(--vscode-charts-yellow);
        border-color: var(--vscode-charts-yellow);
      }

      .status-health-unknown {
        color: var(--vscode-descriptionForeground);
        border-color: var(--vscode-widget-border);
      }

      .deployment-status {
        border: 1px solid transparent;
        background: var(--vscode-editor-background);
      }

      .deployment-status-running {
        color: var(--vscode-charts-blue);
        border-color: var(--vscode-charts-blue);
        animation: pulse 2s infinite;
      }

      .deployment-status-queued {
        color: var(--vscode-charts-yellow);
        border-color: var(--vscode-charts-yellow);
        animation: pulse 2s infinite;
      }

      .deployment-status-success {
        color: var(--vscode-charts-green);
        border-color: var(--vscode-charts-green);
      }

      .deployment-status-failed {
        color: var(--vscode-charts-red);
        border-color: var(--vscode-charts-red);
      }

      .deployment-status-canceled {
        color: var(--vscode-descriptionForeground);
        border-color: var(--vscode-widget-border);
      }

      .deployment-card {
        position: relative;
        border-left: 4px solid var(--vscode-statusBarItem-warningBackground);
      }

      .deployment-time {
        font-size: 12px;
        color: var(--vscode-descriptionForeground);
      }

      .commit-message {
        font-size: 12px;
        color: var(--vscode-foreground);
        line-height: 1.4;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .deploy-button {
        padding: 5px 12px;
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border: none;
        border-radius: var(--control-radius);
        cursor: pointer;
        font-size: 12px;
        white-space: nowrap;
        transition: background 120ms ease;
      }

      .deploy-button:hover {
        background: var(--vscode-button-hoverBackground);
      }

      .secondary-button {
        padding: 5px 10px;
        background: transparent;
        color: var(--vscode-button-foreground);
        border: 1px solid var(--vscode-widget-border);
        border-radius: var(--control-radius);
        cursor: pointer;
        font-size: 12px;
        white-space: nowrap;
        transition: background 120ms ease, border-color 120ms ease;
      }

      .secondary-button:hover {
        background: var(--vscode-list-hoverBackground);
      }

      .button-group {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .env-panel {
        display: flex;
        flex-direction: column;
        gap: 6px;
        border-top: 1px dashed var(--vscode-widget-border);
        padding-top: 10px;
      }

      .env-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .env-key {
        font-size: 12px;
        color: var(--vscode-foreground);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .env-actions {
        display: inline-flex;
        gap: 4px;
      }

      .env-empty {
        font-size: 12px;
        color: var(--vscode-descriptionForeground);
      }

      .deployment-log-panel {
        border-top: 1px dashed var(--vscode-widget-border);
        padding-top: 10px;
        margin-top: 2px;
      }

      .deployment-log-content {
        margin: 0;
        padding: 10px;
        border: 1px solid var(--vscode-widget-border);
        border-radius: var(--control-radius);
        background: var(--vscode-editor-background);
        color: var(--vscode-editor-foreground);
        font-family: var(--vscode-editor-font-family, var(--vscode-font-family));
        font-size: 11px;
        line-height: 1.4;
        max-height: 240px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 20px;
        color: var(--vscode-descriptionForeground);
      }

      .loading-spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--vscode-widget-border);
        border-top-color: var(--vscode-button-background);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .ui-state-banner {
        display: none;
        box-sizing: border-box;
        padding: 8px 10px;
        border-radius: var(--control-radius);
        border: 1px solid transparent;
        font-size: 12px;
      }
      .ui-state-banner.visible {
        display: block;
      }
      .ui-state-loading {
        background: var(--vscode-editorInfo-background);
        color: var(--vscode-editorInfo-foreground);
      }
      .ui-state-error {
        background: var(--vscode-inputValidation-errorBackground);
        color: var(--vscode-inputValidation-errorForeground);
        border-color: var(--vscode-inputValidation-errorBorder);
      }
      .ui-state-unconfigured {
        background: var(--vscode-inputValidation-warningBackground);
        color: var(--vscode-inputValidation-warningForeground);
        border-color: var(--vscode-inputValidation-warningBorder);
      }

      .refresh-button {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .refresh-button.refreshing {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .empty {
        text-align: center;
        padding: 20px;
        color: var(--vscode-descriptionForeground);
        border: 1px dashed var(--vscode-widget-border);
        border-radius: var(--control-radius);
        background: var(--vscode-sideBar-background);
      }

      .section-toggle-button:focus-visible,
      .refresh-button:focus-visible,
      .secondary-button:focus-visible,
      .deploy-button:focus-visible,
      .favorite-button:focus-visible,
      .status-filter:focus-visible,
      .text-filter:focus-visible,
      .favorite-toggle input:focus-visible {
        outline: 1px solid var(--vscode-focusBorder);
        outline-offset: 1px;
      }

      @media (prefers-reduced-motion: reduce) {
        .card,
        .refresh-button,
        .secondary-button,
        .deploy-button,
        .section-toggle-button,
        .loading-spinner,
        .deployment-status-running,
        .deployment-status-queued {
          transition: none;
          animation: none;
        }
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }

      @keyframes progress {
        0% {
          width: 0;
        }
        100% {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="ui-state-banner" class="ui-state-banner" role="status" aria-live="polite"></div>
    <div class="section context-section">
      <div class="filter-row">
        <span class="filter-label" id="context-label">Context:</span>
        <select id="context-select" class="status-filter context-select" title="Select context"></select>
        <button id="create-context-button" class="secondary-button" type="button">Create</button>
        <button id="delete-context-button" class="secondary-button" type="button">Delete</button>
        <button id="configure-context-button" class="secondary-button" type="button">Configure</button>
        <button id="reconfigure-context-button" class="secondary-button" type="button">Reconfigure</button>
      </div>
    </div>

    <div class="section" id="applications-section">
      <div class="section-header">
        <div class="section-title-group">
          <h3 id="applications-title">Applications</h3>
          <span id="applications-count" class="section-count">0</span>
        </div>
        <div class="header-controls">
          <button
            class="section-toggle-button"
            id="toggle-applications"
            type="button"
            data-section-id="applications"
            aria-expanded="true"
          >
            ▾
          </button>
        </div>
      </div>
      <div class="section-body" id="applications-section-body">
        <div class="filter-row">
          <span class="filter-label" id="filter-label">Container status:</span>
          <select id="status-filter" class="status-filter" title="Filter by container status">
            <option value="all">All containers</option>
          </select>
          <span class="filter-label" id="env-sync-strategy-label">Env sync:</span>
          <select
            id="env-sync-strategy"
            class="status-filter"
            title="Default strategy for .env sync conflicts"
          >
            <option value="prompt">Prompt</option>
            <option value="file-all">Use .env</option>
            <option value="remote-all">Keep remote</option>
            <option value="per-key">Per key</option>
          </select>
          <label class="favorite-toggle" for="favorites-only-toggle">
            <input type="checkbox" id="favorites-only-toggle" />
            <span id="favorites-only-label">Favorites only</span>
          </label>
          <label class="favorite-toggle" for="env-actions-toggle">
            <input type="checkbox" id="env-actions-toggle" />
            <span id="env-actions-label">Env actions</span>
          </label>
        </div>
        <div id="applications" class="cards-container">
          <div class="loading">
            <div class="loading-spinner"></div>
            <span id="loading-applications">Loading applications...</span>
          </div>
        </div>
      </div>
    </div>

    <div class="section" id="deployments-section">
      <div class="section-header">
        <div class="section-title-group">
          <h3 id="deployments-title">Active Deployments</h3>
          <span id="deployments-count" class="section-count">0</span>
        </div>
        <div class="header-controls">
          <button
            class="section-toggle-button"
            id="toggle-deployments"
            type="button"
            data-section-id="deployments"
            aria-expanded="true"
          >
            ▾
          </button>
        </div>
      </div>
      <div class="section-body" id="deployments-section-body">
        <div class="filter-row">
          <span class="filter-label" id="deployment-status-filter-label">Deployment status:</span>
          <select id="deployment-status-filter" class="status-filter" title="Filter deployments by status">
            <option value="all">All statuses</option>
          </select>
          <input
            id="deployment-app-filter"
            class="text-filter"
            type="text"
            placeholder="Filter by application"
            title="Filter deployments by application name"
          />
        </div>
        <div id="deployments" class="cards-container">
          <div class="loading">
            <div class="loading-spinner"></div>
            <span id="loading-deployments">Loading deployments...</span>
          </div>
        </div>
      </div>
    </div>

    <div class="section" id="services-section">
      <div class="section-header">
        <div class="section-title-group">
          <h3 id="services-title">Services</h3>
          <span id="services-count" class="section-count">0</span>
        </div>
        <div class="header-controls">
          <button
            class="section-toggle-button"
            id="toggle-services"
            type="button"
            data-section-id="services"
            aria-expanded="true"
          >
            ▾
          </button>
        </div>
      </div>
      <div class="section-body" id="services-section-body">
        <div id="services" class="cards-container">
          <div class="loading">
            <div class="loading-spinner"></div>
            <span id="loading-services">Loading services...</span>
          </div>
        </div>
      </div>
    </div>

    <div class="section" id="databases-section">
      <div class="section-header">
        <div class="section-title-group">
          <h3 id="databases-title">Databases</h3>
          <span id="databases-count" class="section-count">0</span>
        </div>
        <div class="header-controls">
          <button
            class="section-toggle-button"
            id="toggle-databases"
            type="button"
            data-section-id="databases"
            aria-expanded="true"
          >
            ▾
          </button>
        </div>
      </div>
      <div class="section-body" id="databases-section-body">
        <div id="databases" class="cards-container">
          <div class="loading">
            <div class="loading-spinner"></div>
            <span id="loading-databases">Loading databases...</span>
          </div>
        </div>
      </div>
    </div>

    <div class="section" id="projects-section">
      <div class="section-header">
        <div class="section-title-group">
          <h3 id="projects-title">Projects</h3>
          <span id="projects-count" class="section-count">0</span>
        </div>
        <div class="header-controls">
          <button
            class="section-toggle-button"
            id="toggle-projects"
            type="button"
            data-section-id="projects"
            aria-expanded="true"
          >
            ▾
          </button>
        </div>
      </div>
      <div class="section-body" id="projects-section-body">
        <div id="projects" class="cards-container">
          <div class="loading">
            <div class="loading-spinner"></div>
            <span id="loading-projects">Loading projects...</span>
          </div>
        </div>
      </div>
    </div>

    <script nonce="${nonce}">
      const vscode = acquireVsCodeApi();
      const uiLanguage = '${uiLanguage}' === 'pt-BR' ? 'pt-BR' : 'en';
      const i18n = {
        en: {
          applicationsTitle: 'Applications',
          refreshLabel: '↻ Force Refresh',
          filterLabel: 'Container status:',
          filterAll: 'All containers',
          loadingApplications: 'Loading applications...',
          deploymentsTitle: 'Active Deployments',
          loadingDeployments: 'Loading deployments...',
          servicesTitle: 'Services',
          loadingServices: 'Loading services...',
          databasesTitle: 'Databases',
          loadingDatabases: 'Loading databases...',
          projectsTitle: 'Projects',
          loadingProjects: 'Loading projects...',
          noApplications: 'No applications found',
          noDeployments: 'No active deployments',
          noServices: 'No services found',
          noDatabases: 'No databases found',
          noProjects: 'No projects found',
          openInCoolify: 'Open',
          unknown: 'Unknown',
          noUrlConfigured: 'No URL configured',
          notAvailable: 'N/A',
          repository: 'Repository:',
          branch: 'Branch:',
          lastUpdated: 'Last Updated:',
          start: 'Start',
          stop: 'Stop',
          restart: 'Restart',
          deploy: 'Deploy',
          details: 'Details',
          logs: 'Logs',
          hideLogs: 'Hide logs',
          cancel: 'Cancel',
          started: 'Started',
          noCommitDetails: 'No commit details',
          healthPrefix: 'health:',
          favoriteAdd: 'Add to favorites',
          favoriteRemove: 'Remove from favorites',
          favoritesOnly: 'Favorites only',
          envActionsLabel: 'ENV actions',
          contextLabel: 'Context:',
          noContexts: 'No contexts',
          envs: 'Envs',
          addEnv: 'Add Env',
          syncEnv: 'Sync .env',
          envSyncStrategyLabel: 'Env sync:',
          envSyncStrategyPrompt: 'Prompt',
          envSyncStrategyFileAll: 'Use .env',
          envSyncStrategyRemoteAll: 'Keep remote',
          envSyncStrategyPerKey: 'Per key',
          editEnv: 'Edit Env',
          deleteEnv: 'Delete Env',
          envPanelEmpty: 'No environment variables',
          envPanelLoading: 'Loading env vars...',
          serviceDetailsLoading: 'Loading service details...',
          serviceDetailsEmpty: 'No service details available',
          databaseDetailsLoading: 'Loading database details...',
          databaseDetailsEmpty: 'No database details available',
          backups: 'Backups',
          createBackup: 'Create backup',
          restoreBackup: 'Restore',
          backupLoading: 'Loading backups...',

      const previousState = vscode.getState();

          applications: lastApplications,

      function initializeSectionToggles() {
        sectionConfigs.forEach((config) => {
          const button = document.getElementById(config.toggleButtonId);
          if (!button) {
            return;
          }

          button.addEventListener('click', () => toggleSection(config.id));
        });

        applySectionVisibility();
      }

      function toggleSection(sectionId) {
        const wasCollapsed = collapsedSections.has(sectionId);
        if (collapsedSections.has(sectionId)) {
          collapsedSections.delete(sectionId);
        } else {
          collapsedSections.add(sectionId);
        }

        applySectionVisibility();

        if (wasCollapsed) {
          rerenderSection(sectionId);
        }

        persistState();
      }

      function rerenderSection(sectionId) {
        if (sectionId === 'applications') {
          renderApplications(lastApplications);
          return;
        }
        if (sectionId === 'deployments') {
          renderDeployments(lastDeployments);
          return;
        }
        if (sectionId === 'services') {
          renderServices(lastServices);
          return;
        }
        if (sectionId === 'databases') {
          renderDatabases(lastDatabases);
          return;
        }
        if (sectionId === 'projects') {
          renderProjects(lastProjects);
        }
      }

      function updateSectionCount(sectionId, count) {
        const config = sectionConfigs.find((item) => item.id === sectionId);
        if (!config?.countId) {
          return;
        }

        const countElement = document.getElementById(config.countId);
        if (countElement) {
          countElement.textContent = String(Math.max(0, Number(count) || 0));
        }
      }

      function applySectionVisibility() {
        sectionConfigs.forEach((config) => {
          const body = document.getElementById(config.bodyId);
          const button = document.getElementById(config.toggleButtonId);
          const titleElement = document.getElementById(config.titleId);
          const isCollapsed = collapsedSections.has(config.id);

          if (body) {
            body.classList.toggle('section-collapsed', isCollapsed);
          }

          if (button) {
            button.textContent = isCollapsed ? '▸' : '▾';
            button.setAttribute('aria-expanded', String(!isCollapsed));
            const sectionTitle = titleElement?.textContent || config.id;
            const actionText = isCollapsed ? t('expandSection') : t('collapseSection');
            button.title = `${actionText}: ${sectionTitle}`;
            button.setAttribute('aria-label', button.title);
          }
        });
      }

      function normalizeDeploymentStatus(status) {
        return String(status || 'unknown').toLowerCase();
      }

      function updateDeploymentFilterOptions(deployments) {
        if (!deploymentStatusFilter) {
          return;
        }

        const previousSelection = selectedDeploymentStatus;
        const statuses = Array.from(
          new Set(deployments.map((deployment) => normalizeDeploymentStatus(deployment.status)))
        ).sort();

        const options = [
          { value: 'all', label: t('deploymentStatusAll') },
          ...statuses.map((status) => ({
            value: status,
            label: normalizeFilterLabel(status),
          })),
        ];

        const optionNodes = options.map((optionData) => {
          const option = document.createElement('option');
          option.value = optionData.value;
          option.textContent = optionData.label;
          return option;
        });

        deploymentStatusFilter.replaceChildren(...optionNodes);

        const hasPrevious = options.some(
          (option) => option.value === previousSelection
        );
        selectedDeploymentStatus = hasPrevious ? previousSelection : 'all';
        deploymentStatusFilter.value = selectedDeploymentStatus;
      }

      function updateContextSelector(contextNames, selectedContextName) {
        if (!contextSelect) {
          return;
        }

        const names = Array.isArray(contextNames) ? contextNames : [];
        const options =
          names.length > 0
            ? names
            : [t('noContexts')];

        const optionNodes = options.map((contextName) => {
          const option = document.createElement('option');
          option.value = contextName;
          option.textContent = contextName;
          return option;
        });

        contextSelect.replaceChildren(...optionNodes);
        contextSelect.value =
          selectedContextName && options.includes(selectedContextName)
            ? selectedContextName
            : options[0] || '';
      }

      function toggleFavorite(applicationId) {
        if (favoriteApplicationIds.has(applicationId)) {
          favoriteApplicationIds.delete(applicationId);
        } else {
          favoriteApplicationIds.add(applicationId);
        }

        renderApplications(lastApplications);
        persistState();
      }

      function sortApplicationsWithFavorites(applications) {
        return [...applications].sort((a, b) => {
          const aFavorite = favoriteApplicationIds.has(a.id) ? 1 : 0;
          const bFavorite = favoriteApplicationIds.has(b.id) ? 1 : 0;

          if (aFavorite !== bFavorite) {
            return bFavorite - aFavorite;
          }

          const aName = String(a.name || '').toLowerCase();
          const bName = String(b.name || '').toLowerCase();
          return aName.localeCompare(bName);
        });
      }

      function setRefreshing(refreshing) {
        isRefreshing = refreshing;
        if (!refreshButton) {
          return;
        }

        refreshButton.classList.toggle('refreshing', refreshing);
        refreshButton.disabled = refreshing;
      }

      function refreshData() {
        if (isRefreshing) return;
        setRefreshing(true);

      function updateUiState(state, message) {
        currentUiState = state || 'ready';
        const banner = document.getElementById('ui-state-banner');
        if (!banner) {
          return;
        }

        banner.className = 'ui-state-banner';
        if (currentUiState === 'ready') {
          banner.textContent = '';
          return;
        }

        if (currentUiState === 'loading') {
          banner.textContent = '';
          return;
        }

        let defaultMessage = '';
        if (currentUiState === 'error') {
          defaultMessage = t('uiStateError');
          banner.classList.add('ui-state-error');
        } else if (currentUiState === 'unconfigured') {
          defaultMessage = t('uiStateUnconfigured');
          banner.classList.add('ui-state-unconfigured');
        }

        banner.classList.add('visible');
        banner.textContent = message || defaultMessage;
      }

      function formatDate(dateString) {
        const locale = uiLanguage === 'pt-BR' ? 'pt-BR' : 'en-US';
        return new Date(dateString).toLocaleString(locale);
      }

      function parseStatus(status) {
        const rawStatus = String(status || 'unknown').toLowerCase();
        const [containerPart, healthPart] = rawStatus.split(':');
        const containerStatus = containerPart || 'unknown';

        let healthStatus = healthPart;
        if (!healthStatus) {
          if (rawStatus.includes('healthy')) {
            healthStatus = 'healthy';
          } else if (rawStatus.includes('unhealthy')) {
            healthStatus = 'unhealthy';
          }
        }

        return {
          containerStatus,
          healthStatus: healthStatus || 'unknown',
        };
      }

      function getHealthClass(healthStatus) {
        if (healthStatus === 'healthy') {
          return 'status-health-healthy';
        }
        if (healthStatus === 'unhealthy' || healthStatus === 'failed') {
          return 'status-health-unhealthy';
        }
        if (healthStatus === 'starting' || healthStatus === 'initializing') {
          return 'status-health-starting';
        }
        return 'status-health-unknown';
      }

      function normalizeFilterLabel(status) {
        return status.charAt(0).toUpperCase() + status.slice(1);
      }

      function getDeploymentStatusClass(status) {
        const normalized = String(status || 'queued').toLowerCase();

        if (
          normalized.includes('success') ||
          normalized.includes('completed') ||
          normalized.includes('finished')
        ) {
          return 'deployment-status-success';
        }

        if (
          normalized.includes('fail') ||
          normalized.includes('error') ||
          normalized.includes('crash')
        ) {
          return 'deployment-status-failed';
        }

        if (normalized.includes('cancel')) {
          return 'deployment-status-canceled';
        }

        if (normalized.includes('queue') || normalized.includes('pending')) {
          return 'deployment-status-queued';
        }

        return 'deployment-status-running';
      }

      function updateStatusFilterOptions(applications) {
        if (!statusFilter) {
          return;
        }

        const previousSelection = selectedContainerStatus;
        const statuses = Array.from(
          new Set(applications.map((app) => parseStatus(app.status).containerStatus))
        ).sort();

        const options = [
          { value: 'all', label: t('filterAll') },
          ...statuses.map((status) => ({
            value: status,
            label: normalizeFilterLabel(status),
          })),
        ];

        const optionNodes = options.map((optionData) => {
          const option = document.createElement('option');
          option.value = optionData.value;
          option.textContent = optionData.label;
          return option;
        });

        statusFilter.replaceChildren(...optionNodes);

        const hasPrevious = options.some(
          (option) => option.value === previousSelection
        );
        selectedContainerStatus = hasPrevious ? previousSelection : 'all';
        statusFilter.value = selectedContainerStatus;
      }

      window.addEventListener('message', (event) => {
        const message = event.data;
        switch (message.type) {
          case 'ui-state':
            updateUiState(message.state, message.message);
            if (message.state !== 'loading') {
              setRefreshing(false);
            }
            break;
          case 'refresh-data':
            updateUI(
              message.applications,
              message.deployments,
              message.services,
              message.databases,
              message.projects,
              message.contextNames,
              message.activeContextName,
              message.envSyncConflictStrategy
            );
            setRefreshing(false);
            break;
          case 'deployment-status':
            break;
          case 'app-envs-data':
            appEnvsByApplicationId[message.applicationId] = Array.isArray(message.envs)
              ? message.envs
              : [];
            loadingEnvPanels.delete(message.applicationId);
            renderApplications(lastApplications);
            persistState();
            break;
          case 'service-details-data':
            serviceDetailsById[message.serviceId] = Array.isArray(message.details)
              ? message.details
              : [];
            loadingServicePanels.delete(message.serviceId);
            renderServices(lastServices);
            persistState();
            break;
          case 'database-details-data':
            databaseDetailsById[message.databaseId] = Array.isArray(message.details)
              ? message.details
              : [];
            loadingDatabasePanels.delete(message.databaseId);
            renderDatabases(lastDatabases);
            persistState();
            break;
          case 'database-backups-data':
            databaseBackupsById[message.databaseId] = Array.isArray(message.backups)
              ? message.backups
              : [];
            loadingDatabaseBackupPanels.delete(message.databaseId);
            renderDatabases(lastDatabases);
            persistState();
            break;
          case 'project-details-data':
            projectDetailsById[message.projectId] = Array.isArray(message.details)
              ? message.details
              : [];
            loadingProjectPanels.delete(message.projectId);
            renderProjects(lastProjects);
            persistState();
            break;
          case 'deployment-logs-data':
            deploymentLogsById[message.deploymentId] =
              typeof message.logs === 'string' ? message.logs : '';
            loadingDeploymentLogPanels.delete(message.deploymentId);
            renderDeployments(lastDeployments);
            persistState();
            break;
        }
      });

        nextEnvSyncConflictStrategy
      ) {
        lastApplications = Array.isArray(applications) ? applications : [];
        lastDeployments = Array.isArray(deployments) ? deployments : [];
        lastServices = Array.isArray(services) ? services : [];
        lastDatabases = Array.isArray(databases) ? databases : [];
        lastProjects = Array.isArray(projects) ? projects : [];
        availableContexts = Array.isArray(contextNames) ? contextNames : availableContexts;
        activeContextName = activeContext || activeContextName;
        envSyncConflictStrategy =
          nextEnvSyncConflictStrategy || envSyncConflictStrategy;

        if (envSyncStrategy) {
          envSyncStrategy.value = envSyncConflictStrategy;
        }

        updateContextSelector(availableContexts, activeContextName);

        updateStatusFilterOptions(lastApplications);
        updateDeploymentFilterOptions(lastDeployments);
        renderApplications(lastApplications);
        renderDeployments(lastDeployments);
        renderServices(lastServices);
        renderDatabases(lastDatabases);
        renderProjects(lastProjects);
        persistState();
      }

      function renderApplications(applications) {
        const appsContainer = document.getElementById('applications');
        const filteredApplications =
          selectedContainerStatus === 'all'
            ? applications
            : applications.filter(
                (app) =>
                  parseStatus(app.status).containerStatus === selectedContainerStatus
              );
        const favoriteFilteredApplications = showFavoritesOnly
          ? filteredApplications.filter((app) => favoriteApplicationIds.has(app.id))
          : filteredApplications;
        const sortedApplications = sortApplicationsWithFavorites(
          favoriteFilteredApplications
        );

        updateSectionCount('applications', sortedApplications.length);

        if (collapsedSections.has('applications')) {
          return;
        }

        const appNodes = [];
        if (sortedApplications.length === 0) {
          appNodes.push(createEmptyElement(t('noApplications')));
        } else {
          sortedApplications.forEach((app) =>
            appNodes.push(createApplicationCard(app))
          );
        }
        appsContainer.replaceChildren(...appNodes);
      }

      function renderDeployments(deployments) {
        const deploymentsContainer = document.getElementById('deployments');
        const normalizedAppFilterText = deploymentAppFilterText.toLowerCase();
        const filteredDeployments = deployments.filter((deployment) => {
          const matchesStatus =
            selectedDeploymentStatus === 'all' ||
            normalizeDeploymentStatus(deployment.status) ===
              selectedDeploymentStatus;

          const matchesApplication =
            !normalizedAppFilterText ||
            String(deployment.applicationName || '')
              .toLowerCase()
              .includes(normalizedAppFilterText);

          return matchesStatus && matchesApplication;
        });

        updateSectionCount('deployments', filteredDeployments.length);

        if (collapsedSections.has('deployments')) {
          return;
        }

        const deploymentNodes = [];
        if (filteredDeployments.length === 0) {
          deploymentNodes.push(createEmptyElement(t('noDeployments')));
        } else {
          filteredDeployments.forEach((deployment) =>
            deploymentNodes.push(createDeploymentCard(deployment))
          );
        }
        deploymentsContainer.replaceChildren(...deploymentNodes);
      }

      function renderServices(services) {
        const servicesContainer = document.getElementById('services');
        const serviceNodes = [];

        updateSectionCount('services', Array.isArray(services) ? services.length : 0);

        if (collapsedSections.has('services')) {
          return;
        }

        if (!Array.isArray(services) || services.length === 0) {
          serviceNodes.push(createEmptyElement(t('noServices')));
        } else {
          services.forEach((service) => serviceNodes.push(createServiceCard(service)));
        }

        servicesContainer.replaceChildren(...serviceNodes);
      }

      function renderDatabases(databases) {
        const databasesContainer = document.getElementById('databases');
        const databaseNodes = [];

        updateSectionCount('databases', Array.isArray(databases) ? databases.length : 0);

        if (collapsedSections.has('databases')) {
          return;
        }

        if (!Array.isArray(databases) || databases.length === 0) {
          databaseNodes.push(createEmptyElement(t('noDatabases')));
        } else {
          databases.forEach((database) => databaseNodes.push(createDatabaseCard(database)));
        }

        databasesContainer.replaceChildren(...databaseNodes);
      }

      function renderProjects(projects) {
        const projectsContainer = document.getElementById('projects');
        const projectNodes = [];

        updateSectionCount('projects', Array.isArray(projects) ? projects.length : 0);

        if (collapsedSections.has('projects')) {
          return;
        }

        if (!Array.isArray(projects) || projects.length === 0) {
          projectNodes.push(createEmptyElement(t('noProjects')));
        } else {
          projects.forEach((project) => projectNodes.push(createProjectCard(project)));
        }

        projectsContainer.replaceChildren(...projectNodes);
      }
    </script>
  </body>
</html>
