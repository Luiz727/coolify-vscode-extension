<!DOCTYPE html>
<html lang="${uiLanguage}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src ${cspSource} https: data:; style-src ${cspSource} 'unsafe-inline'; script-src 'nonce-${nonce}';"
    />
    <style>
      body {
        font-family: var(--vscode-font-family);
        color: var(--vscode-foreground);
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .content {
        text-align: center;
        max-width: 100%;
      }
      .logo {
        width: 80px;
        height: 80px;
        margin-bottom: 16px;
        transition: filter 0.2s ease;
      }
      .logo:hover {
        filter: drop-shadow(0 4px 8px rgba(140, 82, 255, 0.3));
      }
      h2 {
        font-size: 1.2em;
        margin: 0 0 8px;
        font-weight: 600;
      }
      .subtitle {
        color: var(--vscode-descriptionForeground);
        margin: 0 0 20px;
        font-size: 0.9em;
        line-height: 1.4;
      }
      .configure-button {
        padding: 8px 16px;
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        margin-bottom: 16px;
      }
      .configure-button:hover {
        background: var(--vscode-button-hoverBackground);
      }
      .docs-link {
        color: var(--vscode-textLink-foreground);
        text-decoration: none;
        font-size: 0.9em;
      }
      .docs-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <img src="${logoUri}" alt="Coolify Logo" class="logo" />
      <h2 id="welcome-title">Coolify Deployments</h2>
      <p class="subtitle" id="welcome-subtitle">Configure your Coolify server to get started</p>
      <button class="configure-button" id="configure-button" type="button">
        <span id="configure-label">Configure</span>
      </button>
      <br />
      <a
        href="https://coolify.io/docs/api-reference/authorization#generate"
        class="docs-link"
        target="_blank"
        id="docs-link"
      >
        Learn how to generate API token →
      </a>
    </div>
    <script nonce="${nonce}">
      const vscode = acquireVsCodeApi();
      const uiLanguage = '${uiLanguage}' === 'pt-BR' ? 'pt-BR' : 'en';
      const i18n = {
        en: {
          title: 'Coolify Deployments',
          subtitle: 'Configure your Coolify server to get started',
          configure: 'Configure',
          docs: 'Learn how to generate API token →',
        },
        'pt-BR': {
          title: 'Deployments do Coolify',
          subtitle: 'Configure seu servidor Coolify para começar',
          configure: 'Configurar',
          docs: 'Saiba como gerar o token de API →',
        },
      };

      const text = i18n[uiLanguage] || i18n.en;

      const title = document.getElementById('welcome-title');
      const subtitle = document.getElementById('welcome-subtitle');
      const configureLabel = document.getElementById('configure-label');
      const docsLink = document.getElementById('docs-link');

      if (title) {
        title.textContent = text.title;
      }
      if (subtitle) {
        subtitle.textContent = text.subtitle;
      }
      if (configureLabel) {
        configureLabel.textContent = text.configure;
      }
      if (docsLink) {
        docsLink.textContent = text.docs;
      }

      function configure() {
        vscode.postMessage({ type: 'configure' });
      }

      const configureButton = document.getElementById('configure-button');
      if (configureButton) {
        configureButton.addEventListener('click', configure);
      }
    </script>
  </body>
</html>
